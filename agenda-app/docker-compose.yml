services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agenda
      POSTGRES_PASSWORD: agenda
      POSTGRES_DB: agenda
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenda -d agenda"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
